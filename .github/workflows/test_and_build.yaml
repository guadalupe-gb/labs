name: test and build 

on: 
  push: 
    branches: [ "main" ]
  # pull_request: 
  #   branches: [ "main" ]

permissions:  
  contents: read  
  packages: write

jobs: 
  test-and-build:  

    runs-on: ubuntu-latest 

    steps: 
    - name: pull code from branch
      uses: actions/checkout@v4 
    - name: Install Python 3.11
      uses: actions/setup-python@v3 
      with:
        python-version: "3.11"
    - name: Install dependencies
      working-directory: src-lab2
      run: |
        pip install -r requirements.txt
    - name: Check linting
      working-directory: src-lab2
      run: ruff check .
    - name: Test with pytest
      working-directory: src-lab2
      run: pytest test.py
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN}}
    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: ./src-lab2
        file: ./src-lab2/Dockerfile
        push: true
        tags: ghcr.io/guadalupe-gb/labs/test:0.0.1