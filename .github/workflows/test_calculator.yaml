name: test and build #workflow name

on: #When this workflow will be executed
  push: #When push action
    branches: [ "main" ]
  # pull_request: #When pull request action
  #   branches: [ "main" ]

permissions:  
  contents: read  #permissions to read content.The workflow can read we have in github
  packages: write

jobs: #What is going to do 
  test-and-build:  #job name can be "build" or other

    runs-on: ubuntu-latest #Where is goin to run, in this case will create a container with ubuntu 

    steps: #steps to follow by the job
    - uses: actions/checkout@v4 #pull code of the branch
    - name: Set up Python 3.11
      uses: actions/setup-python@v3 #install python 
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        pip install -r src/requirements.txt
    - name: Check linting
      working-directory: src
      run: ruff check .
    - name: Test with pytest
      working-directory: src
      run: pytest test.py
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN}}
    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: ./src
        file: ./src/Dockerfile
        push: true
        tags: ghcr.io/guadalupe-gb/labs:latest